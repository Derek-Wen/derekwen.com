<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Deepfake Audio Detection - Derek Wen</title>
  <meta name="description"
    content="UCLA Masters Thesis - Evaluating Statistical and Deep Learning Methods for Deepfake Audio Detection">

  <!-- Favicons -->
  <link href="assets/img/favicon.ico" rel="icon">
  <link href="assets/img/apple-touch-icon.png" rel="apple-touch-icon">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">

  <!-- Journey CSS -->
  <link href="assets/css/journey.css" rel="stylesheet">

  <style>
    .project-page {
      min-height: 100vh;
      background: var(--mono-black);
      color: var(--mono-white);
      padding: 80px 24px;
    }

    .project-container {
      max-width: 900px;
      margin: 0 auto;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--mono-silver);
      text-decoration: none;
      margin-bottom: 40px;
      transition: color 0.3s ease;
    }

    .back-link:hover {
      color: var(--accent-blue);
    }

    .project-title {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      margin-bottom: 24px;
      line-height: 1.1;
    }

    .project-links {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }

    .project-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: transparent;
      border: 1px solid var(--mono-mid);
      color: var(--mono-white);
      border-radius: 8px;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .project-btn:hover {
      border-color: var(--accent-blue);
      color: var(--accent-blue);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .project-btn--primary {
      background: var(--accent-blue);
      border-color: var(--accent-blue);
    }

    .project-btn--primary:hover {
      background: transparent;
    }

    .project-description {
      font-size: 1.1rem;
      line-height: 1.8;
      color: var(--mono-light);
      margin-bottom: 40px;
    }

    /* Image Slideshow */
    .slideshow {
      position: relative;
      width: 100%;
      margin-bottom: 40px;
      border-radius: 12px;
      overflow: hidden;
    }

    .slideshow-images {
      display: flex;
      transition: transform 0.5s ease;
    }

    .slideshow-images img {
      width: 100%;
      flex-shrink: 0;
      object-fit: cover;
    }

    .slideshow-nav {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
    }

    .slideshow-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.4);
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .slideshow-dot.active {
      background: var(--accent-blue);
      box-shadow: 0 0 10px var(--accent-glow);
    }

    .slideshow-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid var(--mono-mid);
      color: var(--mono-white);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .slideshow-arrow:hover {
      background: var(--accent-blue);
      border-color: var(--accent-blue);
    }

    .slideshow-arrow--prev {
      left: 16px;
    }

    .slideshow-arrow--next {
      right: 16px;
    }

    /* PDF Section */
    .section-title {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 20px;
      color: var(--mono-white);
    }

    .pdf-container {
      width: 100%;
      height: 800px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--mono-mid);
      margin-bottom: 40px;
    }

    .pdf-container embed {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body class="journey-page">
  <!-- Page Transition Overlay -->
  <div id="page-transition">
    <div class="rect-bar" style="--i:0"></div>
    <div class="rect-bar" style="--i:1"></div>
    <div class="rect-bar" style="--i:2"></div>
    <div class="rect-bar" style="--i:3"></div>
    <div class="rect-bar" style="--i:4"></div>
    <div class="rect-bar" style="--i:5"></div>
  </div>
  <style>
    #page-transition {
      position: fixed;
      inset: 0;
      z-index: 99998;
      pointer-events: none;
      display: flex
    }

    #page-transition .rect-bar {
      flex: 1;
      height: 100%;
      background: #fff;
      transform: translateY(0%)
    }

    #page-transition.entering .rect-bar {
      animation: rectUp .6s cubic-bezier(.65, 0, .35, 1) forwards;
      animation-delay: calc(var(--i)*.05s)
    }

    #page-transition.leaving {
      pointer-events: all
    }

    #page-transition.leaving .rect-bar {
      transform: translateY(-100%);
      animation: rectDown .6s cubic-bezier(.65, 0, .35, 1) forwards;
      animation-delay: calc(var(--i)*.05s)
    }

    #page-transition.idle .rect-bar {
      transform: translateY(-100%)
    }

    @keyframes rectUp {
      from {
        transform: translateY(0%)
      }

      to {
        transform: translateY(-100%)
      }
    }

    @keyframes rectDown {
      from {
        transform: translateY(100%)
      }

      to {
        transform: translateY(0%)
      }
    }
  </style>
  <script>
    (function () {
      const t = document.getElementById('page-transition');
      t.classList.add('entering');
      setTimeout(() => { t.classList.remove('entering'); t.classList.add('idle'); }, 800);
      document.addEventListener('click', function (e) {
        const link = e.target.closest('a');
        if (link && link.href && !link.target && link.hostname === window.location.hostname && !link.getAttribute('href').startsWith('#')) {
          e.preventDefault(); t.classList.remove('idle'); t.classList.add('leaving');
          setTimeout(() => { window.location.href = link.href; }, 800);
        }
      });
    })();
  </script>
  <main class="project-page">
    <div class="project-container">
      <a href="index.html#projects" class="back-link">
        <i class="bi bi-arrow-left"></i> Back to Projects
      </a>

      <h1 class="project-title">Identifying Deepfake Audio with Statistical
        and Deep Learning Methods</h1>

      <div class="project-links">
        <a href="https://escholarship.org/uc/item/1j8315gm" target="_blank" class="project-btn">
          View on eScholarship
        </a>
        <a href="assets/UCLA_THESIS.pdf" target="_blank" class="project-btn project-btn--primary">
          Download PDF
        </a>
      </div>

      <div class="pdf-container">
        <embed src="assets/UCLA_THESIS.pdf" type="application/pdf">
      </div>

    </div>
  </main>
</body>

</html>
